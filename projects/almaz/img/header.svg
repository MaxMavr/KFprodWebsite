<style type="text/css">
	@import url("../../../styles/base-items/const.css");

    .rotating-cube {
		transform-box: fill-box;
		transform-origin: center;
		animation: rotate 45s ease-in-out infinite, pulse 5s ease-in-out infinite;
	}

	@keyframes rotate {
		0% { transform: rotate(0deg); }
		50% { transform: rotate(180deg); }
		100% { transform: rotate(0deg); }
	}

	@keyframes pulse {
		0%, 100% { scale: 1; }
		50% { scale: 1.10; }
	}
</style>

