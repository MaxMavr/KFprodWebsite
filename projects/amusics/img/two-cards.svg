<style type="text/css">
	@import url("../../../styles/base-items/const.css");
	
	.grad1{fill:url(#grad1);stroke:var(--black);stroke-opacity:.25;stroke-width:.5;}
	.grad2{fill:url(#grad2);stroke:var(--black);stroke-opacity:.25;stroke-width:.5;}

	.bg{fill:#E7E6D0;opacity:1;}
	.shw{fill:#2C191C;filter:blur(3px);opacity:0.13;}
	
	.img-draft,.img,.bg,.mjl,.mnl,.dl,.logo{transition:all .5s cubic-bezier(0.75, 0.35, 0.4, 0.99);}
	
	.mjl,.mnl,.dl{opacity:0;stroke-width:1;fill:none;stroke:var(--black);stroke-miterlimit:10;}
	.dl{stroke:var(--draft-color);stroke-dasharray:12;animation: tm linear 60s infinite;}

	.img{overflow:visible;opacity:1;}
	.img-draft{overflow:visible;opacity:0;}
	.logo{fill:#2C191C;opacity:1;}

	.main:hover{
		.bg{opacity:0}
		.mjl{opacity:0.5;}
		.mnl{opacity:0.13;}
		.dl{opacity:0.13;}
		.logo{fill:var(--black);opacity:0.5;}

		.img{opacity:0;}
		.img-draft{opacity:1;}
	}
	@keyframes tm {0%{stroke-dashoffset:0;}100%{stroke-dashoffset:2000;}}
</style>

