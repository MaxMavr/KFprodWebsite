	<use style="--background-color: #EEEAE0; --pattern-color: #221E20;" href="#template"/>
</g>

<rect class="trigger trigger-1" x="0" y="0" width="1920" height="600"
      clip-path="polygon(0 0, 50% 0, 50% 100%, 0 100%)"
      fill="transparent" pointer-events="visiblePainted"/>
<rect class="trigger trigger-2" x="0" y="0" width="1920" height="600"
      clip-path="polygon(50% 50%, 100% 50%, 100% 100%, 50% 100%)"
      fill="transparent" pointer-events="visiblePainted"/>
<rect class="trigger trigger-3" x="0" y="0" width="1920" height="600"
      clip-path="polygon(50% 0, 100% 0, 100% 50%, 50% 50%)"
      fill="transparent" pointer-events="visiblePainted"/>

<script type="text/javascript">
  	const triggers = document.querySelectorAll('.trigger');
	const sections = document.querySelectorAll('.clip-section');

	function resetActiveClasses() {
	sections.forEach(section => {
		section.classList.forEach(className => {
		if (className.startsWith('active-')) {
			section.classList.remove(className);
		}
		});
	});
	}

	triggers.forEach((trigger, index) => {
		trigger.addEventListener('mouseenter', function() {
			resetActiveClasses();
			
			const newClass = `active-${index + 1}`;
			
			sections.forEach(section => section.classList.add(newClass));
		});

		trigger.addEventListener('mouseleave', function() {
			resetActiveClasses();
		});
	});
</script>
</svg>