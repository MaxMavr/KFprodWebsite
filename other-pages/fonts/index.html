<!DOCTYPE html>

<!--#include virtual="/plug-in-elements/copyright-signature.html" -->

<html lang="ru-RU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Шрифты</title>
    <meta name="description" content="Бесплатные шрифты от KFproduction — скачивайте и используйте в своих проектах"/>

    <link rel="icon" type="image/svg+xml" href="../../img/favicon.svg" />
    <link rel="stylesheet" type="text/css" href="../../styles/reset.css" />
    <link rel="stylesheet" type="text/css" href="../../styles/base.css" />
    <link rel="stylesheet" type="text/css" href="../../styles/projects-grid.css"/>
    <link rel="stylesheet" type="text/css" href="project.css" />
  </head>

  <body>
    <main>
      <section class="paragraph">
        <h1 class="headerless">Шрифты</h1>
        <p>
          Вот все буквы, которые я нарисовал своими руками
        </p>
      </section>

      <div class="grid-container">
        <div class="grid-item clickable s2x2"
             style="background-image: url(/fonts/morfin/img/cover.webp)">
          <a class="white grid-item-title element" href="/fonts/morfin" target="_blank">
            <h3>Morfin Sans</h3>
            <div class="tag-container">
              <span class="tag"><span class="minor">Шрифт</span></span>
            </div>
          </a>
          <a class="grid-item-fill" href="/fonts/morfin"></a>
        </div>

        <div class="grid-item clickable s2x2"
             style="background-image: url(/fonts/melectron/img/cover.svg)">
          <a class="white grid-item-title element" href="/fonts/melectron" target="_blank">
            <h3>Melectron</h3>
            <div class="tag-container">
              <span class="tag"><span class="minor">Шрифт</span></span>
            </div>
          </a>
          <a class="grid-item-fill" href="/fonts/melectron"></a>
        </div>

        <div class="grid-item clickable s2x2"
             style="background-image: url(/fonts/nuqun/img/cover.svg)">
          <a class="black grid-item-title element" href="/fonts/nuqun" target="_blank">
            <h3>Nuqun</h3>
            <div class="tag-container">
              <span class="tag black"><span class="minor">Шрифт</span></span>
            </div>
          </a>
          <a class="grid-item-fill" href="/fonts/nuqun"></a>
        </div>
      </div>
    </main>

    <div class="pop-up-container"></div>

    <!--#include virtual="/plug-in-elements/projects-footer.html" -->

    <script src="../../scripts/lang&theme.js"></script>
    <script src="../../scripts/hlink.js"></script>
    <script src="../../scripts/pop-up.js"></script>
  </body>
</html>
