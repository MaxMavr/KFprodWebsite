<!DOCTYPE html>

<!--#include virtual="/plug-in-elements/copyright-signature.html" -->

<html lang="ru-RU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Плакаты для Майнкрафт сервера</title>
    <meta name="description" content="Плакаты для Minecraft-сервера, оформленные в духе советской эпохи" />

    <link rel="icon" type="image/webp" href="/img/favicon-minecraft.webp" />
    <link rel="stylesheet" type="text/css" href="/styles/reset.css" />
    <link rel="stylesheet" type="text/css" href="/styles/base.css" />
    <link rel="stylesheet" type="text/css" href="/styles/projects-grid.css" />
    <link rel="stylesheet" type="text/css" href="/styles/poster-grid.css" />
    <link rel="stylesheet" type="text/css" href="/styles/image-viewer.css" />
    <link rel="stylesheet" type="text/css" href="/styles/projects.css" />
  </head>

  <body>
    <header class="project-header">
      <h1>Плакаты<br />сервера</h1>
      <div>
        <div class="tag-container">
          <span class="tag"><span class="minor">Плакаты</span></span>
          <span class="tag"><span class="minor">Блоки</span></span>
        </div>
      </div>
    </header>

    <main>
      <section class="paragraph">
        <p>
          Я&nbsp;тот&nbsp;самый счастливый обладатель сервера в&nbsp;Майнкрафт,
          и&nbsp;эти&nbsp;плакаты созданы для&nbsp;особых событий
          на&nbsp;нём<span class="fun">. АйПи не дам</span>
        </p>
      </section>

      <div class="poster-demonstration-container s1x1 image-viewer-container">
        <div class="poster-demonstration element">
          <img src="img/poster1.webp" loading="lazy" />
          <section class="description">
            <p>Союз кирки и меча</p>
          </section>
        </div>

        <div class="poster-demonstration element">
          <img src="img/poster2.webp" loading="lazy" />
          <section class="description">
            <p>Карьер</p>
          </section>
        </div>

        <div class="poster-demonstration element">
          <img src="img/poster3.webp" loading="lazy" />
          <section class="description">
            <p>Маяк</p>
          </section>
        </div>

        <div class="poster-demonstration element">
          <img src="img/poster4.webp" loading="lazy" />
          <section class="description">
            <p>Костюмы</p>
          </section>
        </div>

        <div class="poster-demonstration">
          <img src="img/poster5.webp" loading="lazy" />
          <section class="description">
            <p>Ошибки</p>
          </section>
        </div>
      </div>

      <div class="project-footer">
        <p class="minor">Дизайнер<br />Максим Мавряшин</p>
        <p class="minor">Готово в&nbsp;июле<br />2022&nbsp;года</p>
      </div>

      <div class="grid-container">
        <a href="/other-pages/personal" class="grid-item clickable s3x2"
             style="position: relative;">
          <object
            class="handwrite"
            style="width: 120%; top: 15%"
            type="image/svg+xml"
            data="/other-pages/personal/img/cover.svg"></object>
        </a>
        
        <div class="grid-item clickable s3x2"
             style="background-color: var(--black); background-image: url(/personal-projects/posters/img/cover.webp)">
          <a class="white grid-item-title element" href="/personal-projects/posters" target="_blank">
            <h3>Плакаты</h3>
            <div class="tag-container">
              <span class="tag white"><span class="minor">Картинки</span></span>
            </div>
          </a>
          <a class="grid-item-fill" href="/personal-projects/posters"></a>
        </div>
      </div>
    </main>

    <div class="pop-up-container"></div>
    <div class="image-viewer-overlay"></div>

    <!--#include virtual="/plug-in-elements/projects-footer.html" -->
    <!--#include virtual="/plug-in-elements/sticky-personal-footer.html" -->

    <script src="/scripts/lang&theme.js"></script>
    <script src="/scripts/image-viewer.js"></script>
    <script src="/scripts/hlink.js"></script>
    <script src="/scripts/pop-up.js"></script>
  </body>
</html>
